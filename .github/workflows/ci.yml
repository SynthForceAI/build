name: CI

on:
  pull_request:
    branches: [main, nextjs-migration]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          # Dummy values so any code that touches lib/env.ts at build time
          # passes Zod validation. CI does not connect to a real database
          # or Supabase project. Replace with real secrets only if a later
          # workflow needs them.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DIRECT_URL: postgresql://user:pass@localhost:5432/db
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key-aaaaaaaaaa
          SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-aaaaaaaa
          API_KEY_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          NEXT_PUBLIC_APP_URL: https://synthforceai.com
