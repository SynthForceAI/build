name: Sync Provider Usage

# Hits POST /api/jobs/sync-provider-usage to poll each configured provider
# admin key (OpenAI/Anthropic etc.) and ingest recent usage buckets.
#
# Cadence: GitHub Actions' minimum cron interval is 5 minutes, and the
# scheduler can be delayed under load — so we run every 5 minutes rather
# than the spec's "60s." Anthropic's documented polling limit is once per
# minute anyway, so 5m stays well within all provider rate limits.
#
# Required GitHub repo secrets:
#   SYNTHFORCE_API_URL   – e.g. https://synthforceai.com (no trailing slash)
#   SYNC_JOB_SECRET      – must match SYNC_JOB_SECRET in the Vercel env

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync endpoint
        run: |
          curl --fail --silent --show-error \
            -X POST "${{ secrets.SYNTHFORCE_API_URL }}/api/jobs/sync-provider-usage" \
            -H "Authorization: Bearer ${{ secrets.SYNC_JOB_SECRET }}" \
            -H "Content-Type: application/json"
