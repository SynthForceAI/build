name: Deploy to Vercel
on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.AUTH_TOKEN_VERCEL }}
        
      - name: Inject Env Variables for Next.js Build
        run: vercel env pull .env.production.local --environment=production --token=${{ secrets.AUTH_TOKEN_VERCEL }}
        
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.AUTH_TOKEN_VERCEL }}
        
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.AUTH_TOKEN_VERCEL }}
